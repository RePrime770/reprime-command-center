<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RePrime Terminal — Final Logo (v2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=EB+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 40px; font-family: 'EB Garamond', Georgia, serif; background: #1a1a1a; color: #ddd; }
  h2 { font-family: 'EB Garamond', serif; font-style: italic; font-weight: 400; font-size: 18px; color: #FFCC33; letter-spacing: 0.18em; text-transform: uppercase; margin: 40px 0 14px; }
  .container { max-width: 800px; margin: 0 auto; }
  .hero { display: block; width: 100%; height: auto; }
  .label { font-size: 13px; color: #888; margin-top: 8px; font-style: italic; }
</style>
</head>
<body>
<div class="container">

  <h2>Wide format · navy</h2>
  <svg class="hero" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="r1" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#FFCC33" stop-opacity="0"/>
        <stop offset="6%" stop-color="#FFCC33" stop-opacity="1"/>
        <stop offset="94%" stop-color="#FFCC33" stop-opacity="1"/>
        <stop offset="100%" stop-color="#FFCC33" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <rect width="800" height="320" fill="#0E3470"/>
    <rect x="90" y="86" width="620" height="2" fill="url(#r1)"/>
    <text x="400" y="196" text-anchor="middle" font-family="'Cinzel', serif" font-weight="600" font-size="100" letter-spacing="12" fill="#FFCC33">TERMINAL</text>
    <rect x="90" y="220" width="620" height="2" fill="url(#r1)"/>
    <text x="400" y="262" text-anchor="middle" font-family="'EB Garamond', serif" font-style="italic" font-size="27" letter-spacing="1.4" fill="#FFCC33" opacity="0.9">by RePrime</text>
  </svg>
  <div class="label">For email headers, web hero, broker letterhead</div>

  <h2>Wide format · cream paper</h2>
  <svg class="hero" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="r2" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#FFCC33" stop-opacity="0"/>
        <stop offset="6%" stop-color="#FFCC33" stop-opacity="1"/>
        <stop offset="94%" stop-color="#FFCC33" stop-opacity="1"/>
        <stop offset="100%" stop-color="#FFCC33" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <rect width="800" height="320" fill="#F4EEE0"/>
    <rect x="90" y="86" width="620" height="2" fill="url(#r2)"/>
    <text x="400" y="196" text-anchor="middle" font-family="'Cinzel', serif" font-weight="600" font-size="100" letter-spacing="12" fill="#0E3470">TERMINAL</text>
    <rect x="90" y="220" width="620" height="2" fill="url(#r2)"/>
    <text x="400" y="262" text-anchor="middle" font-family="'EB Garamond', serif" font-style="italic" font-size="27" letter-spacing="1.4" fill="#0E3470" opacity="0.85">by RePrime</text>
  </svg>
  <div class="label">For LOIs, printed deal documents, formal correspondence</div>

  <h2>Square medallion · WhatsApp avatar</h2>
  <div style="max-width: 360px; margin: 0 auto;">
    <svg class="hero" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="r3" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#FFCC33" stop-opacity="0"/>
          <stop offset="6%" stop-color="#FFCC33" stop-opacity="1"/>
          <stop offset="94%" stop-color="#FFCC33" stop-opacity="1"/>
          <stop offset="100%" stop-color="#FFCC33" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <rect width="1024" height="1024" fill="#0E3470"/>
      <circle cx="512" cy="512" r="496" fill="none" stroke="#FFCC33" stroke-width="1.5" opacity="0.55"/>
      <rect x="170" y="430" width="684" height="2.5" fill="url(#r3)"/>
      <text x="512" y="556" text-anchor="middle" font-family="'Cinzel', serif" font-weight="600" font-size="112" letter-spacing="13.5" fill="#FFCC33">TERMINAL</text>
      <rect x="170" y="586" width="684" height="2.5" fill="url(#r3)"/>
      <text x="512" y="638" text-anchor="middle" font-family="'EB Garamond', serif" font-style="italic" font-size="32" letter-spacing="1.6" fill="#FFCC33" opacity="0.9">by RePrime</text>
    </svg>
  </div>
  <div class="label">For WhatsApp profile, favicon, app icon, social profile</div>

</div>
</body>
</html>
