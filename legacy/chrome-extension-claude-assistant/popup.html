<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>RePrime Call Sync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #0E3470;
      color: #F5EFD8;
      min-height: 200px;
    }

    /* ── Header ── */
    .hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 2px solid #FFCC33;
    }
    .hdr-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }
    .hdr-title {
      font-size: 15px;
      font-weight: 700;
      color: #FFCC33;
      letter-spacing: 0.03em;
    }
    .hdr-badge {
      margin-left: auto;
      background: rgba(255,204,51,0.15);
      border: 1px solid rgba(255,204,51,0.4);
      color: #FFCC33;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    /* ── Shared ── */
    .view { padding: 16px; }

    .intro {
      color: rgba(245,239,216,0.7);
      font-size: 12px;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    button {
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 9px 16px;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.38; cursor: not-allowed; }
    button:not(:disabled):hover { opacity: 0.85; }

    .btn-primary {
      width: 100%;
      background: #FFCC33;
      color: #0E3470;
      margin-top: 16px;
    }
    .btn-secondary {
      background: rgba(255,204,51,0.12);
      color: #FFCC33;
      border: 1px solid rgba(255,204,51,0.35);
    }
    .btn-ghost {
      background: none;
      color: rgba(245,239,216,0.55);
      padding: 6px 0;
      font-size: 11px;
      letter-spacing: 0;
      font-weight: 400;
    }
    .btn-ghost:hover { color: #F5EFD8; opacity: 1; }

    .error {
      background: rgba(255,80,80,0.12);
      border: 1px solid rgba(255,80,80,0.4);
      border-radius: 6px;
      color: #FF9494;
      font-size: 11px;
      padding: 8px 10px;
      margin-top: 10px;
      line-height: 1.5;
    }

    /* ── View 1: Checklist ── */
    .check-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; }

    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      padding: 9px 11px;
      border-radius: 7px;
      border: 1px solid rgba(255,204,51,0.18);
      background: rgba(255,204,51,0.04);
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .check-item:has(input:checked) {
      border-color: rgba(255,204,51,0.5);
      background: rgba(255,204,51,0.09);
    }
    .check-item input[type="checkbox"] { display: none; }
    .check-box {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      border: 2px solid rgba(255,204,51,0.45);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      background: transparent;
      transition: border-color 0.15s, background 0.15s;
    }
    .check-item:has(input:checked) .check-box {
      background: #FFCC33;
      border-color: #FFCC33;
    }
    .check-tick {
      display: none;
      width: 10px;
      height: 10px;
    }
    .check-item:has(input:checked) .check-tick { display: block; }
    .check-label {
      font-size: 12px;
      line-height: 1.5;
      color: rgba(245,239,216,0.8);
    }
    .check-item:has(input:checked) .check-label { color: #F5EFD8; }

    /* ── View 2: Setup form ── */
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,204,51,0.8);
      letter-spacing: 0.04em;
      margin-bottom: 5px;
      text-transform: uppercase;
    }
    .form-group .hint {
      font-weight: 400;
      text-transform: none;
      color: rgba(245,239,216,0.45);
      letter-spacing: 0;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,204,51,0.25);
      border-radius: 6px;
      padding: 8px 10px;
      color: #F5EFD8;
      font-family: inherit;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: #FFCC33; }
    .form-group input::placeholder { color: rgba(245,239,216,0.3); }
    .form-group select option { background: #0E3470; }

    /* ── View 3: Status ── */
    .status-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,204,51,0.2);
    }
    .status-indicator { display: flex; align-items: center; gap: 8px; }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-ok  { background: #5BE584; box-shadow: 0 0 6px rgba(91,229,132,0.6); }
    .dot-err { background: #FF7474; box-shadow: 0 0 6px rgba(255,116,116,0.6); }
    .dot-off { background: rgba(245,239,216,0.25); }
    .status-text {
      font-size: 13px;
      font-weight: 600;
      color: #F5EFD8;
    }

    /* Toggle switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .toggle-wrap input { display: none; }
    .toggle-track {
      width: 40px;
      height: 22px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,204,51,0.3);
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }
    .toggle-wrap input:checked ~ .toggle-track {
      background: #FFCC33;
      border-color: #FFCC33;
    }
    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #F5EFD8;
      transition: transform 0.2s;
    }
    .toggle-wrap input:checked ~ .toggle-track .toggle-thumb {
      transform: translateX(18px);
      background: #0E3470;
    }
    .toggle-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: rgba(245,239,216,0.6);
    }
    .toggle-wrap input:checked ~ .toggle-label-wrap .toggle-label { color: #FFCC33; }

    .stats {
      padding: 12px 16px 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-line {
      font-size: 12px;
      color: rgba(245,239,216,0.6);
    }
    .stat-line strong { color: #F5EFD8; }

    .view-status-body { padding: 0 16px 16px; }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .btn-row .btn-primary { margin-top: 0; flex: 1; }
  </style>
</head>
<body>

  <!-- ── Header (always visible) ── -->
  <div class="hdr">
    <svg class="hdr-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 16c0-1.1.9-2 2-2h3.5l2 5-2.5 1.5a14 14 0 0 0 7.5 7.5L28 25.5l5 2V31a2 2 0 0 1-2 2C17.9 33 14 23.2 14 16z" fill="#FFCC33"/>
      <path d="M32 10v3.5m0 0a5.5 5.5 0 0 1 0 11" stroke="#FFCC33" stroke-width="2" stroke-linecap="round" fill="none"/>
      <polyline points="34.5,22 32,24.5 29.5,22" stroke="#FFCC33" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <span class="hdr-title">RePrime Call Sync</span>
    <span class="hdr-badge" id="hdr-badge">SETUP</span>
  </div>

  <!-- ══════════════════════════════════════════════════════
       VIEW 1 — Pre-flight checklist
  ══════════════════════════════════════════════════════ -->
  <div id="v-check" class="view">
    <p class="intro">Before you enable syncing, confirm all four items below. All must be ticked to continue.</p>

    <div class="check-list">

      <label class="check-item">
        <input type="checkbox" class="pre-check">
        <span class="check-box">
          <svg class="check-tick" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#0E3470" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="check-label">BlueBubbles Server is running on the cloud Mac</span>
      </label>

      <label class="check-item">
        <input type="checkbox" class="pre-check">
        <span class="check-box">
          <svg class="check-tick" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#0E3470" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="check-label">I have my BlueBubbles Server password ready</span>
      </label>

      <label class="check-item">
        <input type="checkbox" class="pre-check">
        <span class="check-box">
          <svg class="check-tick" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#0E3470" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="check-label"><code style="font-size:11px;background:rgba(255,204,51,0.12);padding:1px 5px;border-radius:3px;">BB_CALL_SECRET</code> is set in Vercel env vars</span>
      </label>

      <label class="check-item">
        <input type="checkbox" class="pre-check">
        <span class="check-box">
          <svg class="check-tick" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#0E3470" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="check-label">Dashboard is live at project-7e87w.vercel.app</span>
      </label>

    </div>

    <button id="btn-to-setup" class="btn-primary" disabled>Continue to Setup →</button>
  </div>

  <!-- ══════════════════════════════════════════════════════
       VIEW 2 — Setup form
  ══════════════════════════════════════════════════════ -->
  <div id="v-setup" class="view" style="display:none">

    <div class="form-group">
      <label>BlueBubbles Server URL</label>
      <input id="f-bbUrl" type="url" placeholder="http://localhost:1234" autocomplete="off" spellcheck="false">
    </div>

    <div class="form-group">
      <label>BlueBubbles Password <span class="hint">(leave blank if none)</span></label>
      <input id="f-bbPw" type="password" placeholder="optional" autocomplete="new-password">
    </div>

    <div class="form-group">
      <label>Dashboard URL</label>
      <input id="f-dashUrl" type="url" placeholder="https://project-7e87w.vercel.app" autocomplete="off" spellcheck="false">
    </div>

    <div class="form-group">
      <label>BB_CALL_SECRET <span class="hint">(from Vercel)</span></label>
      <input id="f-secret" type="password" placeholder="your secret value" autocomplete="new-password">
    </div>

    <div class="form-group">
      <label>Phone Panel</label>
      <select id="f-panel">
        <option value="718">718 — personal iPhone (+1-718-550-5500)</option>
        <option value="305">305 — business Quo (+1-305-778-4861)</option>
      </select>
    </div>

    <div id="setup-err" class="error" style="display:none"></div>

    <button id="btn-save" class="btn-primary">Save &amp; Enable</button>
    <button id="btn-back-check" class="btn-ghost" style="width:100%;margin-top:8px;text-align:center;">← Back</button>
  </div>

  <!-- ══════════════════════════════════════════════════════
       VIEW 3 — Running status
  ══════════════════════════════════════════════════════ -->
  <div id="v-status" style="display:none">

    <!-- Toggle row — always at the top -->
    <div class="status-top">
      <div class="status-indicator">
        <span id="dot" class="dot dot-off"></span>
        <span id="status-text" class="status-text">—</span>
      </div>
      <label class="toggle-wrap" title="Enable / disable syncing">
        <input type="checkbox" id="chk-enabled">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label" id="toggle-lbl">OFF</span>
      </label>
    </div>

    <div class="stats">
      <div id="stat-sync" class="stat-line">—</div>
      <div id="stat-total" class="stat-line">—</div>
    </div>

    <div class="view-status-body">
      <div id="error-msg" class="error" style="display:none"></div>
      <div class="btn-row">
        <button id="btn-sync-now" class="btn-primary">Sync Now</button>
        <button id="btn-edit" class="btn-secondary">Settings</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
